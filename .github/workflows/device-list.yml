name: Device list

permissions:
  contents: write
  actions: write

on:
  workflow_call:
  workflow_dispatch:

jobs:
  toraidl-SM8250-ColorOS16:
    name: "toraidl - SM8250 - ColorOS 16"
    strategy:
      fail-fast: true
    uses: ./.github/workflows/build-toraidl.yml
    secrets: inherit

  JackA1ltman-toraidl-SM8250-ColorOS15-16:
    name: "JackA1ltman - toraidl - SM8250 - ColorOS 15/16"
    strategy:
      fail-fast: true
    uses: ./.github/workflows/build-toraidl-jackaltman.yml
    secrets: inherit

  JackA1ltman-Chippa-a-SM8350-ColorOS16:
    name: "JackA1ltman - Chippa-a - SM8350 - ColorOS 16"
    strategy:
      fail-fast: true
    uses: ./.github/workflows/build-chippa-a-jackaltman.yml
    secrets: inherit

  JackA1ltman-tqmane-SM8350-ColorOS16:
    name: "JackA1ltman - tqmane - SM8250 - ColorOS 16"
    strategy:
      fail-fast: true
    uses: ./.github/workflows/build-tqmane-jackaltman.yml
    secrets: inherit
