name: tqmane - SM8350 - ColorOS 16

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Oneplus 9 Series - ${{ matrix.name }} - ${{ matrix.author }}
    runs-on: ubuntu-latest # u can changed to ubuntu 22.04, and need container set ubuntu-latest
    # container: ubuntu:bionic # if u need use arch linux -> archlinux/archlinux:latest or ubuntu 20.04 -> ubuntu:focal
    strategy:
      matrix:
        include:
          - name: "original"
            author: "tqmane"
            device: "oneplus9series-coloros16"
            ksu: false
      fail-fast: false
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove useless tools
        run: |
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Install necessary packages
        run: |
          sudo apt update
          sudo apt install git python3 curl -y

          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Get build tools
        run: |
          cd $GITHUB_WORKSPACE

          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          repo init -u https://github.com/JackA1ltman/android_kernel_manifest.git -b oneplus/sm8350v_15.0.0_oneplus9pro

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: build-kernel
          max-size: 2G

      - name: Build Kernel
        run: |
          cd $GITHUB_WORKSPACE

          repo sync --force-sync --no-clone-bundle --current-branch --no-tags -j$(nproc --all)

          cd kernel/msm-5.4

          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
          echo "CONFIG_KSU=y" >> ./arch/arm64/configs/vendor/lahaina_QGKI.config
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> ./arch/arm64/configs/vendor/lahaina_QGKI.config
          curl -LSs "https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/refs/heads/mainline/Patches/syscall_hook_patches.sh" | bash -s
          curl -LSs "https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/refs/heads/mainline/Patches/backport_patches.sh" | bash -s

          cd ../../

          BUILD_CONFIG=kernel/msm-5.4/build.config.msm.lahaina VARIANT=qgki LTO=thin BUILD_KERNEL=1 BRAND_SHOW_FLAG=oneplus CC="ccache clang" build/build.sh

          mkdir need_file

          #cp -f kernel/msm-5.4/out/arch/arm64/boot/dts/vendor/oplus/lemonadev/* need_file/
          #cp kernel/msm-5.4/out/arch/arm64/boot/dts/vendor/qcom/dtbo.img need_file/dtbo_qcom.img
          #cp kernel/msm-5.4/out/msm-5.4-lahaina-qgki/dist/Image need_file/Image

      - name: Upload Build Artifacts For Anykernel3
        uses: actions/upload-artifact@v4
        with:
          name: Kernel
          path: |
            out
